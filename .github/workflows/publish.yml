name: Publish Carousel

on:
  schedule:
    - cron: "0 8 * * *"   # 09:00 Canarias (UTC+1)
    - cron: "0 13 * * *"  # 14:00 Canarias (UTC+1)
    - cron: "0 18 * * *"  # 19:00 Canarias (UTC+1)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run chip-tech
        run: python main.py --article-limit 1
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USER_ID:       ${{ secrets.INSTAGRAM_USER_ID }}
          FACEBOOK_ACCESS_TOKEN:   ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:        ${{ secrets.FACEBOOK_PAGE_ID }}
          META_APP_SECRET:         ${{ secrets.META_APP_SECRET }}
          CLOUDINARY_CLOUD_NAME:   ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:      ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:   ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Persist seen articles DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chip.db
          git commit -m "update seen articles db" || true
          git push
